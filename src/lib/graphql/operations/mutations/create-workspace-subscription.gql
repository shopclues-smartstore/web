mutation CreateWorkspaceSubscription($input: CreateWorkspaceSubscriptionInput!) {
  createWorkspaceSubscription(input: $input) {
    subscription {
      id
      workspaceId
      plan
      planId
      status
      provider
      currentPeriodStart
      currentPeriodEnd
      cancelAtPeriodEnd
      providerCustomerId
      providerSubscriptionId
      createdAt
      updatedAt
    }
  }
}
